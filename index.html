<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSS SK Satu Sultan Alam Shah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef6ff 100%);
      color: #0f172a;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body class="min-h-screen pb-10 text-slate-900">
  <div class="max-w-3xl mx-auto px-4 pt-6">
    <nav class="glass-card rounded-3xl p-4 flex items-center justify-between shadow-xl shadow-slate-200/80">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-sky-100 text-sky-700 flex items-center justify-center">
          <span class="text-2xl">📚</span>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900">PSS SK Satu Sultan Alam Shah</h1>
          <p class="text-xs text-slate-500">Imbas QR dan rekod pinjaman terus ke Google Sheets</p>
        </div>
      </div>
      <span class="text-xs px-3 py-2 rounded-2xl bg-sky-50 text-sky-700 border border-sky-200">Google Sheets Backend</span>
    </nav>

    <main class="space-y-6 mt-6">
      <section class="glass-card rounded-[2rem] p-6">
        <div class="flex flex-col gap-4">
          <div class="flex flex-wrap gap-3">
            <button onclick="mulaImbasQR()" class="px-4 py-3 rounded-2xl bg-sky-600 text-white hover:bg-sky-500 transition shadow-md shadow-sky-200">
              📷 Mula Imbas QR
            </button>
          </div>

          <div id="qr-reader" class="w-full rounded-3xl overflow-hidden bg-slate-100 border border-slate-200" style="min-height:320px;"></div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-500">Kod Peralatan</label>
              <input id="input-kod-item" readonly class="mt-2 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900" />
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-500">Nama Peralatan</label>
              <input id="input-nama-item" placeholder="Contoh: Kamera DSLR" class="mt-2 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" />
            </div>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-500">No. KP</label>
              <input id="input-no-kp" placeholder="801020-14-5678" class="mt-2 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400" />
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-500">Nama Peminjam</label>
              <input id="input-nama-peminjam" readonly class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-100 px-4 py-3 text-sm text-slate-700" placeholder="Masukkan No. KP dahulu" />
            </div>
          </div>

          <div class="text-xs text-amber-700">* Imbas semua peralatan dahulu untuk PINJAM PUKAL. Anda boleh tambah beberapa item dalam troli.</div>

          <div class="glass-card rounded-3xl p-4 bg-white border border-slate-200">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.24em] text-slate-500">Troli Imbasan</p>
                <p id="troli-count" class="text-[11px] text-slate-500 mt-1">0 item disenarai</p>
              </div>
              <button type="button" onclick="kosongkanTroli()" class="text-[11px] uppercase tracking-[0.24em] text-rose-600">Kosongkan</button>
            </div>
            <div id="senarai-troli" class="space-y-2 mt-4"></div>
          </div>



          <button onclick="hantarRekod()" class="w-full rounded-3xl bg-emerald-600 px-6 py-4 text-sm font-bold text-white hover:bg-emerald-500 transition shadow-md shadow-emerald-200">
            Pinjam Pukal
          </button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzwRrerYsTWR9tZ99FW_OYKT65h0IjyOAcIFv4LujfhStQBSrYWct1lxOwCDcOLO0UcpA/exec";
    let html5QrScanner = null;
    let dbBorrowers = [];
    let dbInventory = [];
    let troliItems = [];
    let kodPinjamanAktif = new Set();
    let scannerSedangBermula = false;
    let scannerSedangAktif = false;
    let kodScanTerakhir = '';
    let masaScanTerakhir = 0;
    const TEMPOH_DEBOUNCE_SCAN = 1800;

    window.addEventListener('DOMContentLoaded', () => {
      muatDataMaster();
      const inputNoKP = document.getElementById('input-no-kp');
      inputNoKP.addEventListener('input', autoIsiNamaPeminjam);
      inputNoKP.addEventListener('change', autoIsiNamaPeminjam);
    });

    async function muatDataMaster() {
      try {
        const response = await fetch(`${API_URL}?action=getLists`);
        const result = await response.json();
        dbBorrowers = result.borrowers || [];
        dbInventory = result.inventory || [];
        const activeLoans = result.activeLoans || result.loanedCodes || [];
        kodPinjamanAktif = new Set(
          activeLoans
            .map(item => normalizeItemCode(typeof item === 'string' ? item : item?.code || ''))
            .filter(Boolean)
        );
      } catch (e) {
        console.warn('Gagal memuatkan data master:', e);
      }
    }

    function normalizeIC(value) {
      return value.toString().trim().replace(/[^0-9]/g, '');
    }

    function normalizeItemCode(value) {
      return value.toString().trim().replace(/[^A-Z0-9]/gi, '').toUpperCase();
    }

    function adakahItemSedangDipinjam(kodItem) {
      return kodPinjamanAktif.has(normalizeItemCode(kodItem));
    }

    function bunyikanScanBerjaya() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(920, ctx.currentTime);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.14);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);

        // Tutup context kecil ini untuk elak penggunaan memori berlebihan pada telefon.
        setTimeout(() => ctx.close().catch(() => {}), 180);
      } catch (e) {
        console.debug('Bunyi scan gagal dimainkan:', e);
      }
    }

    function autoIsiNamaPeminjam() {
      const ic = normalizeIC(document.getElementById('input-no-kp').value);
      const peminjam = dbBorrowers.find(b => normalizeIC(b.ic) === ic);
      document.getElementById('input-nama-peminjam').value = peminjam ? peminjam.name : '';
    }

    function dapatkanRekodPeminjam(noKP) {
      const ic = normalizeIC(noKP);
      return dbBorrowers.find(b => normalizeIC(b.ic) === ic) || null;
    }

    async function hentikanImbasQR() {
      if (!html5QrScanner) return;

      try {
        if (scannerSedangAktif) {
          await html5QrScanner.stop();
        }
      } catch (err) {
        console.debug('Gagal hentikan scanner:', err);
      }

      try {
        await html5QrScanner.clear();
      } catch (err) {
        console.debug('Gagal clear scanner:', err);
      }

      html5QrScanner = null;
      scannerSedangAktif = false;
      scannerSedangBermula = false;
      kodScanTerakhir = '';
      masaScanTerakhir = 0;
      document.getElementById('qr-reader').innerHTML = '';
    }

    async function mulaImbasQR() {
      if (scannerSedangBermula) {
        return;
      }

      const butangImbas = document.querySelector('button[onclick="mulaImbasQR()"]');
      const noKP = document.getElementById('input-no-kp').value.trim();

      if (scannerSedangAktif) {
        await hentikanImbasQR();
        if (butangImbas) {
          butangImbas.disabled = false;
          butangImbas.textContent = '📷 Mula Imbas QR';
        }
        return;
      }

      if (!noKP) {
        alert('Sila masukkan No. KP dahulu sebelum mula imbas.');
        return;
      }

      try {
        scannerSedangBermula = true;
        if (butangImbas) {
          butangImbas.disabled = true;
          butangImbas.textContent = 'Membuka Kamera...';
        }

        await hentikanImbasQR();

        html5QrScanner = new Html5Qrcode('qr-reader');
        await html5QrScanner.start(
          { facingMode: { exact: 'environment' } },
          { fps: 10, qrbox: 280, aspectRatio: 1.0 },
          qrCodeMessage => {
            const kodItem = normalizeItemCode(qrCodeMessage.trim());
            const masaKini = Date.now();

            if (!kodItem) return;

            // Elak scanner spam baca kod sama berkali-kali pada satu frame/masa pendek.
            if (kodItem === kodScanTerakhir && (masaKini - masaScanTerakhir) < TEMPOH_DEBOUNCE_SCAN) {
              return;
            }

            kodScanTerakhir = kodItem;
            masaScanTerakhir = masaKini;
            tambahKeTroli(kodItem);
          },
          errorMessage => {
            console.debug('QR error:', errorMessage);
          }
        );

        scannerSedangAktif = true;
      } catch (err) {
        try {
          if (html5QrScanner) {
            await html5QrScanner.start(
              { facingMode: 'environment' },
              { fps: 10, qrbox: 280, aspectRatio: 1.0 },
              qrCodeMessage => {
                const kodItem = normalizeItemCode(qrCodeMessage.trim());
                const masaKini = Date.now();

                if (!kodItem) return;
                if (kodItem === kodScanTerakhir && (masaKini - masaScanTerakhir) < TEMPOH_DEBOUNCE_SCAN) {
                  return;
                }

                kodScanTerakhir = kodItem;
                masaScanTerakhir = masaKini;
                tambahKeTroli(kodItem);
              },
              errorMessage => {
                console.debug('QR error:', errorMessage);
              }
            );
            scannerSedangAktif = true;
          }
        } catch (fallbackErr) {
          await hentikanImbasQR();
          alert('Tidak dapat mula imbas QR: ' + fallbackErr);
        }
      } finally {
        scannerSedangBermula = false;
        if (butangImbas && !scannerSedangAktif) {
          butangImbas.disabled = false;
          butangImbas.textContent = '📷 Mula Imbas QR';
        } else if (butangImbas && scannerSedangAktif) {
          butangImbas.disabled = false;
          butangImbas.textContent = '⏹ Henti Imbas';
        }
      }
    }

    function tambahKeTroli(kodItem) {
      if (!kodItem) return;
      const kodItemNormalized = normalizeItemCode(kodItem);
      const noKP = document.getElementById('input-no-kp').value.trim();
      if (!noKP) {
        alert('Sila masukkan No. KP dahulu.');
        return;
      }
      if (troliItems.some(item => normalizeItemCode(item.code) === kodItemNormalized)) {
        alert('Item ini sudah ada dalam troli pinjaman.');
        return;
      }
      if (adakahItemSedangDipinjam(kodItemNormalized)) {
        alert('Item ini sedang dipinjam dan belum dipulangkan.');
        return;
      }
      const inventoryItem = dbInventory.find(item => normalizeItemCode(item.code) === kodItemNormalized);
      const itemName = inventoryItem ? inventoryItem.name : document.getElementById('input-nama-item').value.trim() || 'Tidak diketahui';
      document.getElementById('input-kod-item').value = kodItemNormalized;
      if (inventoryItem) {
        document.getElementById('input-nama-item').value = inventoryItem.name;
      }
      troliItems.push({ code: kodItemNormalized, name: itemName });
      kemaskiniTroliVisual();
      bunyikanScanBerjaya();
    }

    function kemaskiniTroliVisual() {
      const container = document.getElementById('senarai-troli');
      const count = document.getElementById('troli-count');
      if (troliItems.length === 0) {
        container.innerHTML = '<p class="text-xs text-slate-500 italic">Sila imbas peralatan untuk tambah ke troli.</p>';
      } else {
        container.innerHTML = troliItems.map(item => `
          <div class="flex items-center justify-between bg-slate-50 border border-slate-200 px-3 py-2 rounded-2xl">
            <div>
              <p class="text-xs text-slate-600">${item.name}</p>
              <p class="text-[11px] font-mono text-slate-700">${item.code}</p>
            </div>
            <button type="button" onclick="buangDariTroli('${item.code}')" class="text-rose-600 text-xs font-semibold">Padam</button>
          </div>`).join('');
      }
      count.textContent = `${troliItems.length} item disenarai`;
    }

    function buangDariTroli(kod) {
      troliItems = troliItems.filter(item => item.code !== kod);
      kemaskiniTroliVisual();
    }

    function kosongkanTroli() {
      troliItems = [];
      kemaskiniTroliVisual();
    }


    async function hantarRekod() {
      const noKP = document.getElementById('input-no-kp').value.trim();
      const namaPeminjam = document.getElementById('input-nama-peminjam').value.trim();

      if (!noKP) {
        alert('Sila masukkan No. KP sebelum pinjaman.');
        return;
      }
      if (troliItems.length === 0) {
        alert('Sila imbas sekurang-kurangnya satu peralatan untuk pinjam pukal.');
        return;
      }
      if (!namaPeminjam) {
        alert('Nama peminjam tidak dijumpai. Sila semak No. KP.');
        return;
      }

      const borrowerRecord = dapatkanRekodPeminjam(noKP);
      const butangHantar = document.querySelector('button[onclick="hantarRekod()"]');

      const payloads = troliItems.map(item => ({
        action: 'add',
        id: `PSS-${item.code}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        date: new Date().toLocaleDateString('en-GB'),
        time: new Date().toLocaleTimeString('en-GB'),
        name: namaPeminjam,
        category: borrowerRecord?.category || 'Guru',
        item: item.name,
        code: item.code,
        status: 'active',
        returnDate: '-',
        ic: noKP
      }));

      try {
        if (butangHantar) {
          butangHantar.disabled = true;
          butangHantar.textContent = 'Menghantar...';
        }

        for (const payload of payloads) {
          fetch(API_URL, {
            mode: 'no-cors',
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
          });
          kodPinjamanAktif.add(normalizeItemCode(payload.code));
        }

        alert(`Pinjaman pukal berjaya diproses untuk ${troliItems.length} item.`);
        kosongkanTroli();
        document.getElementById('input-kod-item').value = '';
        document.getElementById('input-nama-item').value = '';
      } catch (err) {
        alert('Gagal sambung ke API: ' + err.message);
      } finally {
        if (butangHantar) {
          butangHantar.disabled = false;
          butangHantar.textContent = 'Pinjam Pukal';
        }
      }
    }
  </script>
</body>
</html>
