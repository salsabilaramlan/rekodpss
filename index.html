<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSS Asset Scan & Bukti</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; }
    .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(18px); border: 1px solid rgba(148, 163, 184, 0.12); }
  </style>
</head>
<body class="min-h-screen pb-10">
  <div class="max-w-3xl mx-auto px-4 pt-6">
    <nav class="glass-card rounded-3xl p-4 flex items-center justify-between shadow-xl shadow-slate-900/20">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center">
          <span class="text-2xl">📚</span>
        </div>
        <div>
          <h1 class="text-lg font-bold text-white">PSS Asset System</h1>
          <p class="text-xs text-slate-400">Imbas QR + Lampirkan bukti gambar</p>
        </div>
      </div>
      <span class="text-xs px-3 py-2 rounded-2xl bg-slate-800 text-slate-300">Google Sheets Backend</span>
    </nav>

    <main class="space-y-6 mt-6">
      <section class="glass-card rounded-[2rem] p-6">
        <div class="flex flex-col gap-4">
          <div class="flex flex-wrap gap-3">
            <button onclick="mulaImbasQR()" class="px-4 py-3 rounded-2xl bg-amber-500 text-slate-950 hover:bg-amber-400 transition">
              📷 Mula Imbas QR
            </button>
          </div>

          <div id="qr-reader" class="w-full rounded-3xl overflow-hidden bg-slate-950" style="min-height:320px;"></div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-400">Kod Peralatan</label>
              <input id="input-kod-item" readonly class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white" />
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-400">Nama Peralatan</label>
              <input id="input-nama-item" placeholder="Contoh: Kamera DSLR" class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white" />
            </div>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-400">No. KP</label>
              <input id="input-no-kp" placeholder="801020-14-5678" class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white" />
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.24em] text-slate-400">Nama Peminjam</label>
              <input id="input-nama-peminjam" readonly class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900/70 px-4 py-3 text-sm text-slate-200" placeholder="Masukkan No. KP dahulu" />
            </div>
          </div>

          <div class="text-xs text-amber-300">* Imbas semua peralatan dahulu untuk PINJAM PUKAL. Anda boleh tambah beberapa item dalam troli.</div>

          <div class="glass-card rounded-3xl p-4 bg-slate-950/90 border border-slate-700">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.24em] text-slate-400">Troli Imbasan</p>
                <p id="troli-count" class="text-[11px] text-slate-500 mt-1">0 item disenarai</p>
              </div>
              <button type="button" onclick="kosongkanTroli()" class="text-[11px] uppercase tracking-[0.24em] text-amber-400">Kosongkan</button>
            </div>
            <div id="senarai-troli" class="space-y-2 mt-4"></div>
          </div>



          <button onclick="hantarRekod()" class="w-full rounded-3xl bg-emerald-500 px-6 py-4 text-sm font-bold text-slate-950 hover:bg-emerald-400 transition">
            Pinjam Pukal
          </button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyZGb5o_c7mbMDRV123A4nm9EumA9VwGZDRRzKrwqFdxxkte81gcpXWADroPCd91oj57Q/exec";
    let html5QrScanner = null;
    let dbBorrowers = [];
    let dbInventory = [];
    let troliItems = [];

    window.addEventListener('DOMContentLoaded', () => {
      muatDataMaster();
      document.getElementById('input-no-kp').addEventListener('change', autoIsiNamaPeminjam);
    });

    async function muatDataMaster() {
      try {
        const response = await fetch(`${API_URL}?action=getLists`);
        const result = await response.json();
        dbBorrowers = result.borrowers || [];
        dbInventory = result.inventory || [];
      } catch (e) {
        console.warn('Gagal memuatkan data master:', e);
      }
    }

    function normalizeIC(value) {
      return value.toString().trim().replace(/[^0-9]/g, '');
    }

    function autoIsiNamaPeminjam() {
      const ic = normalizeIC(document.getElementById('input-no-kp').value);
      const peminjam = dbBorrowers.find(b => normalizeIC(b.ic) === ic);
      document.getElementById('input-nama-peminjam').value = peminjam ? peminjam.name : '';
    }

    function mulaImbasQR() {
      if (html5QrScanner) {
        html5QrScanner.stop().catch(() => {});
      }
      html5QrScanner = new Html5Qrcode('qr-reader');
      html5QrScanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: 280 },
        qrCodeMessage => {
          tambahKeTroli(qrCodeMessage.trim());
        },
        errorMessage => {
          console.debug('QR error:', errorMessage);
        }
      ).catch(err => {
        alert('Tidak dapat mula imbas QR: ' + err);
      });
    }

    function tambahKeTroli(kodItem) {
      if (!kodItem) return;
      const noKP = document.getElementById('input-no-kp').value.trim();
      if (!noKP) {
        alert('Sila masukkan No. KP dahulu.');
        return;
      }
      if (troliItems.some(item => item.code === kodItem)) {
        alert('Kod ini sudah ada dalam troli.');
        return;
      }
      const inventoryItem = dbInventory.find(item => item.code.toLowerCase() === kodItem.toLowerCase());
      const itemName = inventoryItem ? inventoryItem.name : document.getElementById('input-nama-item').value.trim() || 'Tidak diketahui';
      document.getElementById('input-kod-item').value = kodItem;
      if (inventoryItem) {
        document.getElementById('input-nama-item').value = inventoryItem.name;
      }
      troliItems.push({ code: kodItem, name: itemName });
      kemaskiniTroliVisual();
    }

    function kemaskiniTroliVisual() {
      const container = document.getElementById('senarai-troli');
      const count = document.getElementById('troli-count');
      if (troliItems.length === 0) {
        container.innerHTML = '<p class="text-xs text-slate-500 italic">Sila imbas peralatan untuk tambah ke troli.</p>';
      } else {
        container.innerHTML = troliItems.map(item => `
          <div class="flex items-center justify-between bg-slate-900/70 border border-slate-700 px-3 py-2 rounded-2xl">
            <div>
              <p class="text-xs text-slate-400">${item.name}</p>
              <p class="text-[11px] font-mono text-slate-300">${item.code}</p>
            </div>
            <button type="button" onclick="buangDariTroli('${item.code}')" class="text-red-400 text-xs font-semibold">Padam</button>
          </div>`).join('');
      }
      count.textContent = `${troliItems.length} item disenarai`;
    }

    function buangDariTroli(kod) {
      troliItems = troliItems.filter(item => item.code !== kod);
      kemaskiniTroliVisual();
    }

    function kosongkanTroli() {
      troliItems = [];
      kemaskiniTroliVisual();
    }


    async function hantarRekod() {
      const noKP = document.getElementById('input-no-kp').value.trim();
      const namaPeminjam = document.getElementById('input-nama-peminjam').value.trim();

      if (!noKP) {
        alert('Sila masukkan No. KP sebelum pinjaman.');
        return;
      }
      if (troliItems.length === 0) {
        alert('Sila imbas sekurang-kurangnya satu peralatan untuk pinjam pukal.');
        return;
      }
      if (!namaPeminjam) {
        alert('Nama peminjam tidak dijumpai. Sila semak No. KP.');
        return;
      }

      const payloads = troliItems.map(item => ({
        action: 'add',
        id: `PSS-${item.code}-${Date.now()}`,
        date: new Date().toLocaleDateString('en-GB'),
        time: new Date().toLocaleTimeString('en-GB'),
        name: namaPeminjam,
        category: 'Guru',
        item: item.name,
        code: item.code,
        status: 'active',
        returnDate: '-',
        ic: noKP
      }));

      try {
        const responses = await Promise.all(payloads.map(payload =>
          fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          })
        ));

        const results = await Promise.all(responses.map(res => res.json()));
        const isSuccess = results.every(r => r.result === 'success');

        if (isSuccess) {
          alert(`Pinjaman pukal berjaya diproses untuk ${troliItems.length} item.`);
          kosongkanTroli();
          document.getElementById('input-kod-item').value = '';
          document.getElementById('input-nama-item').value = '';
        } else {
          alert('Sebahagian rekod gagal dihantar. Sila semak API.');
        }
      } catch (err) {
        alert('Gagal sambung ke API: ' + err.message);
      }
    }
  </script>
</body>
</html>
